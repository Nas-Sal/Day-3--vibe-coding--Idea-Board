<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Idea Board</title>
    <!-- Importing modern Roboto font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main container to center the content -->
    <div class="container">
        <!-- Header Section with an icon and title -->
        <header>
            <div class="header-content">
                <span class="logo-icon">💡</span>
                <h1>Group Idea Board</h1>
            </div>
        </header>

        <div class="board-content">
            <!-- Input section for new ideas -->
            <div class="input-section">
                <div class="form-group">
                    <label for="user-name">Select Name</label>
                    <select id="user-name">
                        <option value="Nimal">Nimal</option>
                        <option value="Sara">Sara</option>
                        <option value="Alex">Alex</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="idea-input">Your Idea</label>
                    <input type="text" id="idea-input" placeholder="Enter your idea here...">
                </div>

                <!-- Button group for adding and clearing -->
                <div class="button-group">
                    <button id="add-idea-btn">Add Idea</button>
                    <button id="clear-input-btn">Clear</button>
                </div>
            </div>

            <!-- Idea Counter Section -->
            <div class="counter-section">
                <p>Total Ideas: <span id="idea-count">0</span></p>
            </div>

            <hr class="divider">

            <!-- List where ideas will be displayed -->
            <ul id="idea-list">
                <!-- Ideas will be dynamically added here -->
            </ul>
        </div>

        <!-- Footer Section -->
        <footer>
            <p>&copy; 2026 Group Idea Board</p>
        </footer>
    </div>

    <!-- Link to the JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
