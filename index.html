<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Group Idea Board</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    width:400px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

select,input{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:10px;
    background-color:#4CAF50;
    color:white;
    border:none;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background-color:#45a049;
}

ul{
    margin-top:20px;
    padding-left:18px;
}

li{
    margin-bottom:8px;
    color:#444;
}

</style>

</head>

<body>

<div class="container">

<h1>Group Idea Board</h1>

<select id="name">
<option>Nimal</option>
<option>Sara</option>
<option>Alex</option>
</select>

<input type="text" id="ideaInput" placeholder="Enter your idea here...">

<button onclick="addIdea()">Add Idea</button>

<ul id="ideaList">
<li>Build a study planner – suggested by Nimal</li>
<li>Start a podcast – suggested by Sara</li>
<li>Organize a coding workshop – suggested by Alex</li>
</ul>

</div>

<script>

function addIdea(){

let idea=document.getElementById("ideaInput").value;
let name=document.getElementById("name").value;

if(idea.trim()==""){
alert("Please enter an idea");
return;
}

let li=document.createElement("li");
li.textContent = idea + " – suggested by " + name;

document.getElementById("ideaList").appendChild(li);

document.getElementById("ideaInput").value="";

}

</script>

</body>
</html>
