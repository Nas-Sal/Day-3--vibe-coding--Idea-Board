<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Idea Board</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Inter',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;

/* Mesh Gradient Background */

background:
radial-gradient(at 20% 30%, #c7d2fe 0px, transparent 50%),
radial-gradient(at 80% 20%, #fbcfe8 0px, transparent 50%),
radial-gradient(at 50% 80%, #a5f3fc 0px, transparent 50%),
#f8fafc;
}

/* Main Container */

.container{
width:560px;
background:white;
border-radius:24px;
border:1px solid #e5e7eb;
padding:35px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

/* Header */

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:25px;
font-weight:600;
font-size:20px;
}

.logo{
font-size:24px;
}

/* Form */

.form-group{
display:flex;
flex-direction:column;
gap:15px;
margin-bottom:25px;
}

/* Inputs */

select,input{
height:44px;
padding:10px 12px;
border-radius:10px;
border:1px solid #e5e7eb;
background:#f3f4f6;
font-size:14px;
transition:0.2s;
}

select:focus,input:focus{
outline:none;
border-color:#6366f1;
box-shadow:0 0 0 3px rgba(99,102,241,0.2);
}

/* Buttons */

button{
background:#6366f1;
color:white;
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:translateY(-2px);
background:#4f46e5;
}

/* Idea Board */

.idea-board{
display:flex;
flex-direction:column;
gap:12px;
margin-bottom:20px;
}

/* Idea Card */

.idea-card{
background:white;
padding:15px;
border-radius:12px;
border:1px solid #e5e7eb;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
display:flex;
justify-content:space-between;
align-items:center;
animation:slideIn 0.3s ease;
}

/* Animation */

@keyframes slideIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Idea Content */

.idea-content{
display:flex;
flex-direction:column;
}

.idea-text{
font-size:15px;
font-weight:500;
}

.idea-author{
font-size:12px;
color:#6b7280;
margin-top:4px;
}

/* Delete Button */

.delete-btn{
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

/* Status Bar */

.status-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding-top:15px;
border-top:1px solid #e5e7eb;
font-size:14px;
}

.clear-btn{
background:#111827;
padding:6px 12px;
border-radius:8px;
font-size:12px;
}

.clear-btn:hover{
background:#000;
}

/* Footer */

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#6b7280;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<span class="logo">💡</span>
Group Idea Board
</div>

<div class="form-group">

<input type="text" id="name" placeholder="Enter your name">

<input type="text" id="ideaInput" placeholder="Enter your idea here...">

<button onclick="addIdea()">Add Idea</button>

</div>

<div class="idea-board" id="ideaList">

<div class="idea-card">
<div class="idea-content">
<div class="idea-text">Build a study planner</div>
<div class="idea-author">suggested by Nimal</div>
</div>
<button class="delete-btn" onclick="deleteIdea(this)">Delete</button>
</div>

<div class="idea-card">
<div class="idea-content">
<div class="idea-text">Start a podcast</div>
<div class="idea-author">suggested by Sara</div>
</div>
<button class="delete-btn" onclick="deleteIdea(this)">Delete</button>
</div>

</div>

<!-- Status Bar -->

<div class="status-bar">

<div>
Total Ideas: <span id="ideaCount">2</span>
</div>

<button class="clear-btn" onclick="clearAll()">Clear All</button>

</div>

<div class="footer">
© 2026 Idea Board App
</div>

</div>

<script>

function updateCounter(){
let count=document.querySelectorAll(".idea-card").length;
document.getElementById("ideaCount").textContent=count;
}

function addIdea(){

let idea=document.getElementById("ideaInput").value;
let name=document.getElementById("name").value;

if(name.trim()==""){
alert("Please enter your name");
return;
}

if(idea.trim()==""){
alert("Please enter an idea");
return;
}

let card=document.createElement("div");
card.className="idea-card";

card.innerHTML=
`<div class="idea-content">
<div class="idea-text">${idea}</div>
<div class="idea-author">suggested by ${name}</div>
</div>
<button class="delete-btn" onclick="deleteIdea(this)">Delete</button>`;

document.getElementById("ideaList").appendChild(card);

document.getElementById("ideaInput").value="";

updateCounter();
}

function deleteIdea(button){
button.parentElement.remove();
updateCounter();
}

function clearAll(){
document.getElementById("ideaList").innerHTML="";
updateCounter();
}

updateCounter();

</script>

</body>
</html>
