<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Group Idea Board</title>

<!-- Modern Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Inter', 'Poppins', sans-serif;
background:#f8fafc;
margin:0;
display:flex;
justify-content:center;
padding:60px 20px;
}

/* Main Container */

.container{
background:white;
width:520px;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* Title */

h1{
text-align:center;
margin-bottom:35px;
font-weight:600;
}

/* Form Section */

.form-group{
display:flex;
flex-direction:column;
gap:15px;
margin-bottom:30px;
}

select,input{
height:42px;
padding:10px 12px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
outline:none;
transition:0.2s;
}

select:focus,input:focus{
border-color:#6366f1;
box-shadow:0 0 0 2px rgba(99,102,241,0.2);
}

/* Button */

button{
background:#6366f1;
color:white;
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
transition:all 0.2s ease;
}

button:hover{
background:#5558e6;
}

button:active{
transform:translateY(2px);
}

/* Idea Board */

.idea-board{
display:flex;
flex-direction:column;
gap:12px;
}

/* Idea Cards */

.idea-card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
display:flex;
justify-content:space-between;
align-items:center;
}

/* Idea Text */

.idea-text{
font-size:15px;
}

/* Author */

.idea-author{
font-size:12px;
color:#6b7280;
margin-top:4px;
}

/* Idea Content */

.idea-content{
display:flex;
flex-direction:column;
}

/* Delete Button */

.delete-btn{
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.delete-btn:hover{
background:#dc2626;
}

/* Counter */

.counter{
margin-top:25px;
text-align:center;
font-size:14px;
color:#374151;
}

</style>

</head>

<body>

<div class="container">

<h1>💡 Group Idea Board</h1>

<div class="form-group">

<select id="name">
<option>Nimal</option>
<option>Sara</option>
<option>Alex</option>
</select>

<input type="text" id="ideaInput" placeholder="Enter your idea here...">

<button onclick="addIdea()">Add Idea</button>

</div>

<div class="idea-board" id="ideaList">

<div class="idea-card">
<div class="idea-content">
<div class="idea-text">Build a study planner</div>
<div class="idea-author">suggested by Nimal</div>
</div>
<button class="delete-btn" onclick="deleteIdea(this)">Delete</button>
</div>

<div class="idea-card">
<div class="idea-content">
<div class="idea-text">Start a podcast</div>
<div class="idea-author">suggested by Sara</div>
</div>
<button class="delete-btn" onclick="deleteIdea(this)">Delete</button>
</div>

<div class="idea-card">
<div class="idea-content">
<div class="idea-text">Organize a coding workshop</div>
<div class="idea-author">suggested by Alex</div>
</div>
<button class="delete-btn" onclick="deleteIdea(this)">Delete</button>
</div>

</div>

<div class="counter">
Total Ideas: <span id="ideaCount">3</span>
</div>

</div>

<script>

function updateCounter(){
let count=document.querySelectorAll(".idea-card").length;
document.getElementById("ideaCount").textContent=count;
}

function addIdea(){

let idea=document.getElementById("ideaInput").value;
let name=document.getElementById("name").value;

if(idea.trim()==""){
alert("Please enter an idea");
return;
}

let card=document.createElement("div");
card.className="idea-card";

card.innerHTML=
`<div class="idea-content">
<div class="idea-text">${idea}</div>
<div class="idea-author">suggested by ${name}</div>
</div>
<button class="delete-btn" onclick="deleteIdea(this)">Delete</button>`;

document.getElementById("ideaList").appendChild(card);

document.getElementById("ideaInput").value="";

updateCounter();
}

function deleteIdea(button){
button.parentElement.remove();
updateCounter();
}

updateCounter();

</script>

</body>
</html>
